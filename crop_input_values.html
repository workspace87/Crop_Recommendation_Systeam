
<style>
h2.sr-only{position:absolute;width:1px;height:1px;overflow:hidden;clip:rect(0,0,0,0)}
.wrap{padding:1rem 0}
input[type=text]{width:100%;padding:6px 10px;font-size:13px;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-md);background:var(--color-background-secondary);color:var(--color-text-primary);box-sizing:border-box}
table{width:100%;border-collapse:collapse;font-size:13px}
th{background:var(--color-background-secondary);color:var(--color-text-secondary);font-weight:500;padding:8px 10px;text-align:left;border-bottom:0.5px solid var(--color-border-tertiary);position:sticky;top:0}
td{padding:7px 10px;border-bottom:0.5px solid var(--color-border-tertiary);color:var(--color-text-primary);white-space:nowrap}
tr:hover td{background:var(--color-background-secondary)}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:var(--border-radius-md);font-weight:500}
.t-green{background:#EAF3DE;color:#3B6D11}.t-blue{background:#E6F1FB;color:#185FA5}.t-amber{background:#FAEEDA;color:#854F0B}
@media(prefers-color-scheme:dark){.t-green{background:#27500A;color:#C0DD97}.t-blue{background:#0C447C;color:#B5D4F4}.t-amber{background:#633806;color:#FAC775}}
.search-wrap{margin-bottom:12px}
</style>
<h2 class="sr-only">Recommended input values for all 22 crops in the crop recommendation model</h2>
<div class="wrap">
<div class="search-wrap">
  <input type="text" id="search" placeholder="Search crop..." oninput="filterTable()">
</div>
<div style="overflow-x:auto;border:0.5px solid var(--color-border-tertiary);border-radius:var(--border-radius-lg)">
<table id="cropTable">
<thead>
<tr>
  <th>Crop</th><th>N</th><th>P</th><th>K</th><th>Temp (°C)</th><th>Humidity (%)</th><th>pH</th><th>Rainfall (mm)</th><th>Category</th>
</tr>
</thead>
<tbody id="tbody">
</tbody>
</table>
</div>
<p style="font-size:12px;color:var(--color-text-secondary);margin-top:8px">These are ideal midpoint values from the real dataset. Small variations still predict correctly.</p>
</div>
<script>
const crops = [
  {name:"Rice",      N:80,  P:40,  K:40,  temp:23, hum:82, ph:6.5, rain:210, cat:"cereal"},
  {name:"Wheat",     N:100, P:40,  K:40,  temp:22, hum:65, ph:6.5, rain:70,  cat:"cereal"},
  {name:"Maize",     N:80,  P:40,  K:35,  temp:22, hum:65, ph:6.2, rain:65,  cat:"cereal"},
  {name:"Chickpea",  N:40,  P:68,  K:80,  temp:18, hum:16, ph:7.1, rain:73,  cat:"pulse"},
  {name:"Kidney Beans",N:20,P:68, K:80,  temp:20, hum:22, ph:5.7, rain:105, cat:"pulse"},
  {name:"Pigeon Peas",N:20, P:68,  K:80,  temp:28, hum:49, ph:5.8, rain:150, cat:"pulse"},
  {name:"Moth Beans", N:20, P:40,  K:20,  temp:28, hum:53, ph:6.9, rain:51,  cat:"pulse"},
  {name:"Mung Bean",  N:20, P:40,  K:20,  temp:29, hum:82, ph:6.7, rain:48,  cat:"pulse"},
  {name:"Black Gram", N:40, P:68,  K:19,  temp:30, hum:65, ph:7.1, rain:67,  cat:"pulse"},
  {name:"Lentil",     N:18, P:68,  K:19,  temp:24, hum:65, ph:6.9, rain:46,  cat:"pulse"},
  {name:"Pomegranate",N:18, P:18,  K:40,  temp:22, hum:90, ph:6.0, rain:107, cat:"fruit"},
  {name:"Banana",     N:100,P:82,  K:50,  temp:27, hum:80, ph:6.0, rain:105, cat:"fruit"},
  {name:"Mango",      N:20, P:18,  K:30,  temp:31, hum:50, ph:5.8, rain:95,  cat:"fruit"},
  {name:"Grapes",     N:20, P:125, K:200, temp:24, hum:82, ph:6.0, rain:70,  cat:"fruit"},
  {name:"Watermelon", N:100,P:18,  K:50,  temp:25, hum:85, ph:6.5, rain:51,  cat:"fruit"},
  {name:"Muskmelon",  N:100,P:18,  K:50,  temp:28, hum:92, ph:6.5, rain:25,  cat:"fruit"},
  {name:"Apple",      N:20, P:125, K:200, temp:22, hum:92, ph:5.8, rain:113, cat:"fruit"},
  {name:"Orange",     N:20, P:18,  K:30,  temp:23, hum:92, ph:7.0, rain:110, cat:"fruit"},
  {name:"Papaya",     N:50, P:60,  K:50,  temp:34, hum:92, ph:6.7, rain:145, cat:"fruit"},
  {name:"Coconut",    N:20, P:10,  K:30,  temp:27, hum:94, ph:5.9, rain:175, cat:"fruit"},
  {name:"Cotton",     N:118,P:46,  K:20,  temp:25, hum:65, ph:6.8, rain:80,  cat:"cash"},
  {name:"Jute",       N:78, P:46,  K:40,  temp:25, hum:80, ph:6.5, rain:175, cat:"cash"},
];

const catLabel = {cereal:"Cereal",pulse:"Pulse",fruit:"Fruit",cash:"Cash Crop"};
const catClass = {cereal:"t-blue",pulse:"t-amber",fruit:"t-green",cash:"t-green"};

function renderTable(data){
  const tb = document.getElementById('tbody');
  tb.innerHTML = data.map(c=>`
    <tr>
      <td style="font-weight:500">${c.name}</td>
      <td>${c.N}</td><td>${c.P}</td><td>${c.K}</td>
      <td>${c.temp}</td><td>${c.hum}</td><td>${c.ph}</td><td>${c.rain}</td>
      <td><span class="tag ${catClass[c.cat]}">${catLabel[c.cat]}</span></td>
    </tr>`).join('');
}

function filterTable(){
  const q = document.getElementById('search').value.toLowerCase();
  renderTable(crops.filter(c=>c.name.toLowerCase().includes(q)));
}

renderTable(crops);
</script>
